spring:
  application:
    name: spring-ai-demo
  main:
    banner-mode: off
  ai:
    #    openai:
    #      api-key: ${OPENAI_API_KEY}
    #      # Use only if you route through an internal gateway / proxy:
    #      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    #      # Optional metadata headers (only if your environment needs them)
    #      # organization-id: ${OPENAI_ORG:}
    #      # project-id: ${OPENAI_PROJECT:}
    #      chat:
    #        options:
    #          # Pin a model explicitly (choose what you actually use)
    #          model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
    #          temperature: ${OPENAI_TEMPERATURE:0.2}
    #          # If your Spring AI version supports it:
    #          max-tokens: ${OPENAI_MAX_TOKENS:800}
    #          # top-p: ${OPENAI_TOP_P:1.0}
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: never
        timeout: 5m
        max-retries: 0
      chat:
        options:
          model: llama3.2:3b
          num-ctx: 4096
          temperature: 0.4
          keep-alive: "15m"
          # Nucleus sampling
          top-p: 0.8
          # Top-k sampling, restricts sampling to the top K most likely next tokens.
          top-k: 40
          use-m-lock: true
          use-m-map: true
logging:
  level:
    root: INFO
    gr.codelearn: TRACE
    org.springframework: INFO
    org.springframework.ai: INFO