# https://docs.docker.com/compose/compose-file
name: spring-ai-demo

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "ollama list >/dev/null 2>&1 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G
        reservations:
          cpus: 1
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ "gpu" ]

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: [ "sh", "-lc" ]
    command:
      - |
        ollama pull llama3.2:3b
        ollama pull gemma3:4b
        ollama pull smollm:1.7b
        ollama pull qwen3:4b
        ollama pull phi3:3.8b
        ollama pull phi3:14b
        ollama pull nomic-embed-text
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 2G
        reservations:
          cpus: 0.25
          memory: 512M
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-trixie
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=spring-ai-demo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=spring-ai-demo
    ports:
      - "5432:5432"
    volumes:
      - ~/dbdata/postgresql/spring-ai-demo:/var/lib/postgresql/data
    networks:
      - postgres-network
    deploy:
      restart_policy:
        condition: on-failure
        delay: 3s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: 1
          memory: 512M
        reservations:
          cpus: 0.25
          memory: 128M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 2s
      retries: 10
networks:
  llm-network:
  postgres-network:
volumes:
  ollama_data:
  open_webui_data:


